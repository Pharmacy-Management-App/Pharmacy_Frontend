<!-- src/app/pages/admin/manage-inventory/manage-inventory.component.html -->
<div class="admin-layout">
  <aside class="sidebar">
    <div class="brand"><span class="brand-icon">+</span><span>PharmaCare Admin</span></div>
    <nav>
      <a routerLink="/admin/dashboard">Dashboard</a>
      <a routerLink="/admin/manage-users">Users</a>
      <a routerLink="/admin/manage-pharmacists">Pharmacists</a>
      <a routerLink="/admin/manage-medicines">Medicines</a>
      <a routerLink="/admin/manage-inventory" class="active">Inventory</a>
    </nav>
  </aside>
  <main class="main-content">
    <h1>Manage Inventory</h1>
    <div *ngIf="message" class="msg">{{ message }}</div>
    <div *ngIf="loading">Loading...</div>
    <table *ngIf="!loading" class="data-table">
      <thead>
        <tr><th>Medicine</th><th>Batch</th><th>In Stock</th>
            <th>Reorder Level</th><th>Expiry</th><th>Action</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let i of inventory">
          <td>{{ i.medicine?.name }}</td>
          <td>{{ i.batchNumber }}</td>
          <td>
            <span *ngIf="editId !== i.medicineId">{{ i.quantityInStock }}</span>
            <input *ngIf="editId === i.medicineId" type="number"
              [(ngModel)]="editQty" class="qty-input" />
          </td>
          <td [class]="i.quantityInStock <= i.reorderLevel ? 'low-stock' : ''">
            {{ i.reorderLevel }}</td>
          <td>{{ i.expiryDate | date }}</td>
          <td class="actions">
            <button *ngIf="editId !== i.medicineId"
              (click)="startEdit(i)" class="btn-edit">Edit</button>
            <button *ngIf="editId === i.medicineId"
              (click)="saveEdit(i.medicineId)" class="btn-save">Save</button>
          </td>
        </tr>
      </tbody>
    </table>
  </main>
</div>
