<!-- src/app/pages/admin/manage-pharmacists/manage-pharmacists.component.html -->
<div class="admin-layout">
  <aside class="sidebar">
    <div class="brand"><span class="brand-icon">+</span><span>PharmaCare Admin</span></div>
    <nav>
      <a routerLink="/admin/dashboard">Dashboard</a>
      <a routerLink="/admin/manage-users">Users</a>
      <a routerLink="/admin/manage-pharmacists" class="active">Pharmacists</a>
      <a routerLink="/admin/manage-medicines">Medicines</a>
      <a routerLink="/admin/manage-inventory">Inventory</a>
    </nav>
  </aside>
  <main class="main-content">
    <h1>Manage Pharmacists</h1>
    <div *ngIf="message" class="msg">{{ message }}</div>
    <div class="filter-bar">
      <button (click)="setFilter('all')" [class]="filter==='all'?'btn active':'btn'">All</button>
      <button (click)="setFilter('pending')" [class]="filter==='pending'?'btn active':'btn'">Pending</button>
    </div>
    <div *ngIf="loading">Loading...</div>
    <table *ngIf="!loading" class="data-table">
      <thead>
        <tr><th>Name</th><th>Email</th><th>License</th>
            <th>Qualification</th><th>Status</th><th>Actions</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let p of pharmacists">
          <td>{{ p.user?.fullName }}</td>
          <td>{{ p.user?.email }}</td>
          <td>{{ p.licenseNumber }}</td>
          <td>{{ p.qualification }}</td>
          <td><span [ngClass]="'badge ' + p.status.toLowerCase()">{{ p.status }}</span></td>
          <td class="actions">
            <button *ngIf="p.status==='Pending'" (click)="approve(p.id)"
              class="btn green">Approve</button>
            <button *ngIf="p.status==='Pending'" (click)="reject(p.id)"
              class="btn red">Reject</button>
          </td>
        </tr>
      </tbody>
    </table>
  </main>
</div>
